# MongoDB Connection
spring.data.mongodb.uri=mongodb://localhost:27017/edrr_db
spring.data.mongodb.database=edrr_db

# Server Port
server.port=8081

# JWT Secret Key (change this to a long random string in production)
jwt.secret=EDRRSystemSecretKey2024VeryLongSecretKeyForSecurity
jwt.expiration=86400000

# App Name
spring.application.name=edrr-backend

# Show MongoDB queries in console (helpful for debugging)
logging.level.org.springframework.data.mongodb=DEBUG